name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate icons
        run: python3 icons/generate.py

      - name: Verify Chrome manifest
        run: |
          cp manifest.chrom.json manifest.json
          python3 -c "import json; json.load(open('manifest.json'))"
          echo "Chrome manifest OK"

      - name: Verify Firefox manifest
        run: |
          cp manifest.firefox.json manifest.json
          python3 -c "import json; json.load(open('manifest.json'))"
          echo "Firefox manifest OK"
