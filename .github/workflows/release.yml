name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install Pillow

      - name: Generate icons
        run: python3 icons/generate.py

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Lint Firefox extension
        run: |
          cp manifest.firefox.json manifest.json
          npm install -g web-ext
          web-ext lint --self-hosted

      - name: Create Chrome ZIP
        run: |
          cp manifest.chrom.json manifest.json
          zip -r facmod-chrome.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "manifest.firefox.json" \
            -x "manifest.chrom.json" \
            -x "AGENTS.md" \
            -x "BUILD.md" \
            -x "icons/logo.png" \
            -x "icons/generate.py"

      - name: Create Firefox ZIP
        run: |
          cp manifest.firefox.json manifest.json
          zip -r facmod-firefox.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "manifest.firefox.json" \
            -x "manifest.chrom.json" \
            -x "AGENTS.md" \
            -x "BUILD.md" \
            -x "icons/logo.png" \
            -x "icons/generate.py"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            facmod-chrome.zip
            facmod-firefox.zip
          generate_release_notes: true
